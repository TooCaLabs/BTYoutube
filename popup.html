<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BTYouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #111116;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.12);
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.1);
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 20px;
      height: 20px;
      color: #000;
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* Features section */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .feature-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .feature-row + .feature-row {
      border-top: 1px solid var(--border);
    }

    .feature-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .feature-desc {
      font-size: 11px;
      color: var(--muted);
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--muted);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: all 0.2s ease;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-slider::after {
      background: var(--accent);
      transform: translateX(16px);
    }

    /* Shortcut info */
    .shortcuts {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .shortcut-label {
      font-size: 12px;
      color: var(--muted);
    }

    .shortcut-key {
      display: flex;
      gap: 4px;
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border-strong);
      border-radius: 5px;
      padding: 2px 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: var(--text);
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Badge */
    .badge {
      background: var(--accent);
      color: #000;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>BTYouTube</h1>
      <p>A better YouTube experience</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Features</div>

    <div class="feature-row">
      <div class="feature-info">
        <span class="feature-name">Spotlight Search</span>
        <span class="feature-desc">Quick search with ⌘K</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-spotlight" checked/>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="feature-row">
      <div class="feature-info">
        <span class="feature-name">Custom UI Theme</span>
        <span class="feature-desc">Dark editorial redesign</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-ui" checked/>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="shortcuts">
    <div class="section-title">Keyboard Shortcuts</div>
    <div class="shortcut-row">
      <span class="shortcut-label">Open Spotlight</span>
      <div class="shortcut-key"><kbd>⌘</kbd><kbd>K</kbd></div>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Close</span>
      <div class="shortcut-key"><kbd>ESC</kbd></div>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Navigate results</span>
      <div class="shortcut-key"><kbd>↑</kbd><kbd>↓</kbd></div>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Open result</span>
      <div class="shortcut-key"><kbd>↵</kbd></div>
    </div>
  </div>

  <div class="footer">
    BTYouTube v1.0 &mdash; Open source
  </div>

  <script src="popup.js"></script>
</body>
</html>
